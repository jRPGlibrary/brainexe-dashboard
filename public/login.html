<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainEXE Admin · Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
      background: linear-gradient(135deg, #171923 0%, #0c0e14 100%);
      color: #eef0f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      background: #232631;
      border: 1px solid #333847;
      border-radius: 14px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .login-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .login-subtitle {
      font-size: 13px;
      color: #98a1b8;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #98a1b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      background: #1c1f2a;
      border: 1px solid #333847;
      border-radius: 8px;
      color: #eef0f8;
      font-size: 14px;
      transition: border-color 0.15s;
    }
    .form-input:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.14);
    }
    .form-btn {
      width: 100%;
      padding: 11px 16px;
      background: #818cf8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
      margin-top: 8px;
    }
    .form-btn:hover {
      background: #a5b4fc;
    }
    .form-btn:active {
      transform: translateY(1px);
    }
    .form-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .error-msg {
      margin-top: 12px;
      padding: 10px;
      background: rgba(248, 113, 113, 0.14);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 6px;
      color: #f87171;
      font-size: 12px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
      vertical-align: -2px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">🧠</div>
      <div class="login-title">BrainEXE</div>
      <div class="login-subtitle">Admin Dashboard — Connexion requise</div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input
          type="password"
          id="password-input"
          class="form-input"
          placeholder="Entrez le mot de passe"
          required
          autofocus
        />
      </div>
      <button type="submit" class="form-btn" id="login-btn">Se connecter</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('password-input').value;
      const btn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('error-msg');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connexion...';
      errorDiv.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/';
        } else {
          errorDiv.textContent = data.error || 'Erreur de connexion';
          errorDiv.classList.add('show');
          btn.disabled = false;
          btn.innerHTML = 'Se connecter';
          document.getElementById('password-input').focus();
        }
      } catch (err) {
        errorDiv.textContent = 'Erreur réseau: ' + err.message;
        errorDiv.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Se connecter';
      }
    }
  </script>
</body>
</html>
