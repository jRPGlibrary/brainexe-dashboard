<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainEXE Admin · Live</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-badge">🧠</div>
          <div>
            <div style="font-weight:700">BrainEXE</div>
            <div class="text-sm text-muted">Admin v2.2.0</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Live</div>
        <button class="nav-item active" data-section="overview">
          <span>📊</span> Vue d'ensemble
        </button>
        <button class="nav-item" data-section="admin">
          <span>🎛️</span> Admin live
        </button>
        <button class="nav-item" data-section="logs">
          <span>📜</span> Logs
        </button>

        <div class="nav-label">Serveur</div>
        <button class="nav-item" data-section="channels">
          <span>💬</span> Salons
        </button>
        <button class="nav-item" data-section="roles">
          <span>🎭</span> Rôles
        </button>
        <button class="nav-item" data-section="members">
          <span>👥</span> Membres
        </button>

        <div class="nav-label">Bot</div>
        <button class="nav-item" data-section="automations">
          <span>⚡</span> Automatisations
        </button>
        <button class="nav-item" data-section="posts">
          <span>📝</span> Posts manuels
        </button>

        <div class="nav-label">Système</div>
        <button class="nav-item" data-section="backups">
          <span>💾</span> Backups
        </button>
        <button class="nav-item" data-section="settings">
          <span>⚙️</span> Paramètres
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="theme-switch">
          <button class="theme-btn" data-theme="light" title="Light">☀️</button>
          <button class="theme-btn" data-theme="dark" title="Dark">🌙</button>
          <button class="theme-btn" data-theme="sombre" title="Sombre">⚫</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="topbar-title" id="page-title">Vue d'ensemble</div>
          <div class="topbar-subtitle" id="page-subtitle">Dashboard temps réel · toute modification est appliquée instantanément</div>
        </div>
        <div class="topbar-right">
          <span class="pill" id="member-pill">👥 <b id="member-count">—</b> membres</span>
          <span class="pill" id="slot-pill">🧠 <span id="slot-label">—</span></span>
          <span class="pill" id="mood-pill">⚡ <span id="mood-label">—</span></span>
          <span class="pill offline" id="ws-pill"><span class="dot"></span>Connexion…</span>
        </div>
      </header>

      <div class="content">
        <section class="section active" id="section-overview"></section>
        <section class="section" id="section-admin"></section>
        <section class="section" id="section-logs"></section>
        <section class="section" id="section-channels"></section>
        <section class="section" id="section-roles"></section>
        <section class="section" id="section-members"></section>
        <section class="section" id="section-automations"></section>
        <section class="section" id="section-posts"></section>
        <section class="section" id="section-backups"></section>
        <section class="section" id="section-settings"></section>
      </div>
    </main>
  </div>

  <div id="toasts"></div>
  <div id="modal-bg" class="modal-bg"></div>

  <script src="app.js"></script>
</body>
</html>
