<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainEXE Dashboard</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          🧠 <span>BrainEXE</span>
        </div>
        <div class="logo-version">Dashboard v2.1.0</div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-group-label">Général</div>
        <button class="nav-item active" data-section="overview">
          <span class="icon">📊</span> Vue d'ensemble
        </button>
        <button class="nav-item" data-section="logs">
          <span class="icon">📜</span> Logs
        </button>

        <div class="nav-group-label">Serveur</div>
        <button class="nav-item" data-section="channels">
          <span class="icon">💬</span> Salons
        </button>
        <button class="nav-item" data-section="roles">
          <span class="icon">🎭</span> Rôles
        </button>
        <button class="nav-item" data-section="members">
          <span class="icon">👥</span> Membres
        </button>

        <div class="nav-group-label">Bot</div>
        <button class="nav-item" data-section="automations">
          <span class="icon">⚡</span> Automatisations
        </button>
        <button class="nav-item" data-section="posts">
          <span class="icon">📝</span> Posts manuels
        </button>

        <div class="nav-group-label">Système</div>
        <button class="nav-item" data-section="backups">
          <span class="icon">💾</span> Backups
        </button>
        <button class="nav-item" data-section="settings">
          <span class="icon">⚙️</span> Paramètres
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="theme-switcher">
          <button class="theme-btn" data-theme="light" title="Thème clair">☀️</button>
          <button class="theme-btn" data-theme="dark" title="Thème sombre">🌙</button>
          <button class="theme-btn" data-theme="sombre" title="Thème très sombre">⚫</button>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="topbar">
        <div>
          <div class="page-title">BrainEXE Dashboard</div>
          <div class="page-subtitle">Gestion du serveur Discord & bot Brainee</div>
        </div>
        <div class="topbar-right">
          <span id="ws-status" class="status-pill offline">
            <span class="dot"></span>Connexion...
          </span>
        </div>
      </header>

      <div class="content">
        <section class="section active" id="section-overview"></section>
        <section class="section" id="section-channels"></section>
        <section class="section" id="section-roles"></section>
        <section class="section" id="section-members"></section>
        <section class="section" id="section-automations"></section>
        <section class="section" id="section-posts"></section>
        <section class="section" id="section-logs"></section>
        <section class="section" id="section-backups"></section>
        <section class="section" id="section-settings"></section>
      </div>
    </main>
  </div>

  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>

  <!-- MODAL -->
  <div id="modal-backdrop" class="modal-backdrop"></div>

  <script src="app.js"></script>
</body>
</html>
