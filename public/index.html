<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BrainEXE Admin · Live</title>
  <link rel="stylesheet" href="app.css">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-badge">🧠</div>
          <div>
            <div style="font-weight:700">BrainEXE</div>
            <div class="text-sm text-muted">Admin v2.2.1</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-label">Live</div>
        <button class="nav-item active" data-section="overview">
          <span>📊</span> Vue d'ensemble
        </button>
        <button class="nav-item" data-section="admin">
          <span>🎛️</span> Admin live
        </button>
        <button class="nav-item" data-section="health">
          <span>❤️</span> Santé système
        </button>
        <button class="nav-item" data-section="logs">
          <span>📜</span> Logs
        </button>

        <div class="nav-label">Serveur</div>
        <button class="nav-item" data-section="channels">
          <span>💬</span> Salons
        </button>
        <button class="nav-item" data-section="roles">
          <span>🎭</span> Rôles
        </button>
        <button class="nav-item" data-section="members">
          <span>👥</span> Membres
        </button>

        <div class="nav-label">Bot</div>
        <button class="nav-item" data-section="automations">
          <span>⚡</span> Automatisations
        </button>
        <button class="nav-item" data-section="posts">
          <span>📝</span> Posts manuels
        </button>
        <button class="nav-item" data-section="emotions">
          <span>💗</span> Émotions
        </button>
        <button class="nav-item" data-section="bonds">
          <span>💞</span> Relations
        </button>
        <button class="nav-item" data-section="schedule">
          <span>🗓️</span> Planning
        </button>

        <div class="nav-label">Système</div>
        <button class="nav-item" data-section="backups">
          <span>💾</span> Backups
        </button>
        <button class="nav-item" data-section="audit">
          <span>📖</span> Historique
        </button>
        <button class="nav-item" data-section="settings">
          <span>⚙️</span> Paramètres
        </button>
        <button class="nav-item" data-section="funding">
          <span>💰</span> Soutien
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="theme-switch">
          <button class="theme-btn" data-theme="light" title="Light">☀️</button>
          <button class="theme-btn" data-theme="dark" title="Dark">🌙</button>
          <button class="theme-btn" data-theme="sombre" title="Sombre">⚫</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menu-toggle"
            aria-label="Ouvrir le menu de navigation"
            aria-expanded="false"
            aria-controls="sidebar">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
              <rect y="2"  width="16" height="2" rx="1"/>
              <rect y="7"  width="16" height="2" rx="1"/>
              <rect y="12" width="16" height="2" rx="1"/>
            </svg>
          </button>
          <div>
            <div class="topbar-title" id="page-title">Vue d'ensemble</div>
            <div class="topbar-subtitle" id="page-subtitle">Dashboard temps réel · toute modification est appliquée instantanément</div>
          </div>
        </div>
        <div class="topbar-right">
          <span class="pill" id="member-pill">👥 <b id="member-count">—</b> membres</span>
          <span class="pill" id="slot-pill">🧠 <span id="slot-label">—</span></span>
          <span class="pill" id="mood-pill">⚡ <span id="mood-label">—</span></span>
          <span class="pill" id="funding-pill">💰 <span id="funding-label">—</span></span>
          <span class="pill offline" id="ws-pill" title="État de la connexion temps réel"><span class="dot"></span>Connexion…</span>
        </div>
      </header>

      <div class="content">
        <section class="section active" id="section-overview"></section>
        <section class="section" id="section-admin"></section>
        <section class="section" id="section-health"></section>
        <section class="section" id="section-logs"></section>
        <section class="section" id="section-channels"></section>
        <section class="section" id="section-roles"></section>
        <section class="section" id="section-members"></section>
        <section class="section" id="section-automations"></section>
        <section class="section" id="section-posts"></section>
        <section class="section" id="section-emotions"></section>
        <section class="section" id="section-bonds"></section>
        <section class="section" id="section-schedule"></section>
        <section class="section" id="section-backups"></section>
        <section class="section" id="section-audit"></section>
        <section class="section" id="section-settings"></section>
        <section class="section" id="section-funding"></section>
      </div>
    </main>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>
  <div id="toasts" role="status" aria-live="polite" aria-atomic="false"></div>
  <div id="modal-bg" class="modal-bg" role="dialog" aria-modal="true"></div>

  <script src="app.js"></script>
</body>
</html>
